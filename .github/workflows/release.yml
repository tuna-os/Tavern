name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-macos:
    name: "macOS App Bundle"
    runs-on: macos-14
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        brew update
        brew install gtk4 libadwaita blueprint-compiler meson ninja pkg-config desktop-file-utils

    - name: Build App Bundle
      run: ./run.sh --cask

    - name: Zip App Bundle
      run: zip -r Tavern-macOS.zip Tavern.app

    - name: Upload Release Asset
      uses: softprops/action-gh-release@v2
      with:
        files: Tavern-macOS.zip
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-appimage:
    name: "Linux AppImage"
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4

    - name: Install build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          meson ninja-build pkg-config gettext desktop-file-utils \
          blueprint-compiler python3 python3-gi python3-requests python3-markdown \
          libgtk-4-dev libadwaita-1-dev libgirepository1.0-dev gobject-introspection \
          libfuse2 curl

    - name: Build and stage AppDir
      run: |
        meson setup builddir-appimage --prefix=/usr
        meson compile -C builddir-appimage
        DESTDIR="$PWD/AppDir" meson install -C builddir-appimage

    - name: Debug AppDir contents
      run: |
        echo "=== AppDir structure ==="
        find AppDir -type f | sort || echo "AppDir is empty or missing!"
        echo "=== checking desktop file ==="
        ls -la AppDir/usr/share/applications/org.tunaos.tavern.desktop || echo "desktop file missing!"
        echo "=== checking icon ==="
        ls -la AppDir/usr/share/icons/hicolor/scalable/apps/org.tunaos.tavern.svg || echo "icon missing!"
        echo "=== checking binary ==="
        ls -la AppDir/usr/bin/tavern || echo "binary missing!"

    - name: Build AppImage
      run: |
        curl -L -o linuxdeploy-x86_64.AppImage \
          https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
        curl -L -o linuxdeploy-plugin-gtk.sh \
          https://raw.githubusercontent.com/linuxdeploy/linuxdeploy-plugin-gtk/master/linuxdeploy-plugin-gtk.sh

        chmod +x linuxdeploy-x86_64.AppImage linuxdeploy-plugin-gtk.sh

        export ARCH=x86_64
        export LDAI_OUTPUT=Tavern-Linux.AppImage
        export LDAI_UPDATE_INFORMATION="gh-releases-zsync|hanthor|Tavern|latest|Tavern-Linux.AppImage.zsync"
        export DEPLOY_GTK_VERSION=4

        ./linuxdeploy-x86_64.AppImage \
          --appdir AppDir \
          --plugin gtk \
          --desktop-file AppDir/usr/share/applications/org.tunaos.tavern.desktop \
          --icon-file AppDir/usr/share/icons/hicolor/scalable/apps/org.tunaos.tavern.svg \
          --output appimage

        # Debug: check if GTK plugin bundled libraries
        echo "=== AppDir contents after plugin ==="
        find AppDir -name "*.so*" -type f | sort | head -30
        du -sh AppDir/

    - name: Upload Release Asset
      uses: softprops/action-gh-release@v2
      with:
        files: Tavern-Linux.AppImage
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-flatpak:
    name: "Flatpak Bundle"
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:gnome-50
      options: --privileged
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4

    - uses: flatpak/flatpak-github-actions/flatpak-builder@v6
      with:
        bundle: Tavern-Linux.flatpak
        manifest-path: org.tunaos.tavern.json
        cache-key: flatpak-builder-${{ github.sha }}

    - name: Upload Release Asset
      uses: softprops/action-gh-release@v2
      with:
        files: Tavern-Linux.flatpak
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
