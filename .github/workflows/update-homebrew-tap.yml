name: Update Homebrew Tap

on:
  release:
    types: [published, created]
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag to process (e.g., v0.1.3)'
        required: true
        type: string

jobs:
  update-tap:
    name: "Update Homebrew Tap Casks"
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout tap repository
        uses: actions/checkout@v4
        with:
          repository: hanthor/homebrew-tap
          token: ${{ secrets.TAP_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Download release assets and compute SHA256
        id: download
        run: |
          # Get version from either release event or manual input
          if [ -n "${{ github.event.release.tag_name }}" ]; then
            VERSION="${{ github.event.release.tag_name }}"
          else
            VERSION="${{ github.event.inputs.release_tag }}"
          fi
          VERSION="${VERSION#v}"  # Remove 'v' prefix
          
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          
          # Download macOS app
          echo "Downloading Tavern-macOS.zip..."
          curl -sL -o /tmp/Tavern-macOS.zip "${{ github.event.release.assets[1].browser_download_url }}" 2>/dev/null || \
          curl -sL -o /tmp/Tavern-macOS.zip "https://github.com/hanthor/Tavern/releases/download/v${VERSION}/Tavern-macOS.zip"
          
          MACOS_SHA256=$(sha256sum /tmp/Tavern-macOS.zip | awk '{print $1}')
          echo "macos_sha256=${MACOS_SHA256}" >> $GITHUB_OUTPUT

          # Download Linux Flatpak
          echo "Downloading Tavern-Linux.flatpak..."
          curl -sL -o /tmp/Tavern-Linux.flatpak "https://github.com/hanthor/Tavern/releases/download/v${VERSION}/Tavern-Linux.flatpak"

          FLATPAK_SHA256=$(sha256sum /tmp/Tavern-Linux.flatpak | awk '{print $1}')
          echo "flatpak_sha256=${FLATPAK_SHA256}" >> $GITHUB_OUTPUT

      - name: Update macOS cask
        run: |
          cat > Casks/tavern.rb << 'EOF'
          cask "tavern" do
            version "${{ steps.download.outputs.version }}"
            sha256 "${{ steps.download.outputs.macos_sha256 }}"
          
            url "https://github.com/hanthor/Tavern/releases/download/v#{version}/Tavern-macOS.zip"
            name "Tavern"
            desc "Modern Homebrew client for macOS built with Python and GTK 4"
            homepage "https://github.com/hanthor/Tavern"
          
            livecheck do
              url "https://github.com/hanthor/Tavern/releases.atom"
              strategy :github_latest
            end
          
            app "Tavern.app"
          
            zap trash: [
              "~/Library/Application Support/Tavern",
              "~/Library/Preferences/dev.hanthor.Tavern.*",
              "~/Library/Caches/dev.hanthor.Tavern",
            ]
          end
          EOF

      - name: Update Linux cask
        run: |
          cat > Casks/tavern.rb << 'EOF'
          cask "tavern" do
            version "${{ steps.download.outputs.version }}"
            sha256 "${{ steps.download.outputs.flatpak_sha256 }}"

            url "https://github.com/hanthor/Tavern/releases/download/v#{version}/Tavern-Linux.flatpak"
            container type: :naked
            name "Tavern"
            desc "Modern Homebrew client for Linux built with Python and GTK 4"
            homepage "https://github.com/hanthor/Tavern"

            depends_on formula: "flatpak"

            livecheck do
              url "https://github.com/hanthor/Tavern/releases.atom"
              strategy :github_latest
            end

            postflight do
              system_command "flatpak",
                args: ["install", "--user", "-y", staged_path/"Tavern-Linux.flatpak"],
                sudo: false
            end

            uninstall_postflight do
              system_command "flatpak",
                args: ["uninstall", "--user", "-y", "dev.hanthor.Tavern"],
                sudo: false
            end

            zap trash: [
              "~/.var/app/dev.hanthor.Tavern",
            ]
          end
          EOF

      - name: Commit and push updates
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git rm --ignore-unmatch Formula/tavern.rb
          git add Casks/tavern.rb
          
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update Tavern cask to v${{ steps.download.outputs.version }}
          
          - tavern: Linux Flatpak installer (macOS coming soon)
          
          Co-authored-by: Copilot <223556219+Copilot@users.noreply.github.com>"
            git push origin main
          fi
