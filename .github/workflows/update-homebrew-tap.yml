name: Update Homebrew Tap

on:
  release:
    types: [published, created]
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag to process (e.g., v0.1.3)'
        required: true
        type: string

jobs:
  update-tap:
    name: "Update Homebrew Tap Casks"
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout tap repository
        uses: actions/checkout@v4
        with:
          repository: hanthor/homebrew-tap
          token: ${{ secrets.TAP_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Download release assets and compute SHA256
        id: download
        run: |
          # Get version from either release event or manual input
          if [ -n "${{ github.event.release.tag_name }}" ]; then
            VERSION="${{ github.event.release.tag_name }}"
          else
            VERSION="${{ github.event.inputs.release_tag }}"
          fi
          VERSION="${VERSION#v}"  # Remove 'v' prefix
          
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

          # Download macOS app
          echo "Downloading Tavern-macOS.zip..."
          curl -sL -o /tmp/Tavern-macOS.zip "https://github.com/hanthor/Tavern/releases/download/v${VERSION}/Tavern-macOS.zip"
          MACOS_SHA256=$(sha256sum /tmp/Tavern-macOS.zip | awk '{print $1}')
          echo "macos_sha256=${MACOS_SHA256}" >> $GITHUB_OUTPUT

          # Download Linux AppImage
          echo "Downloading Tavern-Linux.AppImage..."
          curl -sL -o /tmp/Tavern-Linux.AppImage "https://github.com/hanthor/Tavern/releases/download/v${VERSION}/Tavern-Linux.AppImage"

          APPIMAGE_SHA256=$(sha256sum /tmp/Tavern-Linux.AppImage | awk '{print $1}')
          echo "appimage_sha256=${APPIMAGE_SHA256}" >> $GITHUB_OUTPUT

      - name: Update unified cask (macOS + Linux)
        run: |
          cat > Casks/tavern.rb << 'EOF'
          cask "tavern" do
            version "${{ steps.download.outputs.version }}"

            on_macos do
              sha256 "${{ steps.download.outputs.macos_sha256 }}"
              url "https://github.com/hanthor/Tavern/releases/download/v#{version}/Tavern-macOS.zip"

              app "Tavern.app"

              zap trash: [
                "~/Library/Application Support/Tavern",
                "~/Library/Preferences/dev.hanthor.Tavern.*",
                "~/Library/Caches/dev.hanthor.Tavern",
              ]
            end

            on_linux do
              sha256 "${{ steps.download.outputs.appimage_sha256 }}"
              url "https://github.com/hanthor/Tavern/releases/download/v#{version}/Tavern-Linux.AppImage"

              # Wrap the AppImage with --appimage-extract-and-run so the cask
              # works on any glibc-based distro without requiring libfuse2 on
              # the host. The wrapper is generated in preflight (which runs
              # before the `binary` stanza creates its symlink).
              preflight do
                FileUtils.chmod "+x", staged_path/"Tavern-Linux.AppImage"
                wrapper = staged_path/"tavern"
                File.write(wrapper, <<~SH)
                  #!/bin/sh
                  exec "#{staged_path}/Tavern-Linux.AppImage" --appimage-extract-and-run "$@"
                SH
                FileUtils.chmod "+x", wrapper
              end

              binary "tavern"

              zap trash: [
                "~/.config/tavern",
                "~/.cache/tavern",
                "~/.local/share/tavern",
              ]
            end

            name "Tavern"
            desc "Modern Homebrew client built with Python and GTK 4"
            homepage "https://github.com/hanthor/Tavern"

            livecheck do
              url "https://github.com/hanthor/Tavern/releases.atom"
              strategy :github_latest
            end
          end
          EOF

      - name: Remove deprecated tavern-linux cask
        run: |
          git rm --ignore-unmatch Casks/tavern-linux.rb Formula/tavern-linux.rb

      - name: Commit and push updates
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git rm --ignore-unmatch Formula/tavern.rb Formula/tavern-linux.rb
          git add Casks/tavern.rb
          
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update Tavern cask to v${{ steps.download.outputs.version }}

          - macOS: Tavern.app bundle
          - Linux: Tavern-Linux.AppImage (extract-and-run wrapper)

          Co-authored-by: Copilot <223556219+Copilot@users.noreply.github.com>"
            git push origin main
          fi
